<!DOCTYPE html>
<html>
<head>
    <title>Add Medicine</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="form-container">

    <div class="form-card">

        <h1>💊 Add Medicine</h1>

        <form action="/medicines/save" method="POST">

            <label>Medicine Name</label>
            <input type="text"
                   name="medicine_name"
                   required>

            <label>Category</label>
            <input type="text"
                   name="category"
                   required>

            <label>Price</label>
            <input type="number"
                   step="0.01"
                   name="price"
                   required>

            <label>Quantity</label>
            <input type="number"
                   name="quantity"
                   required>

            <label>Expiry Date</label>
            <input type="date"
                   name="expiry_date"
                   required>

            <button type="submit">
                Save Medicine
            </button>

        </form>

        <br>

        <a href="/medicines">
            <button class="secondary-btn">
                Back to Dashboard
            </button>
        </a>

    </div>

</div>

</body>
</html>
