<!DOCTYPE html>
<html>
<head>
    <title>View Medicines</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="table-container">

    <h1>💊 Medicine List</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Expiry Date</th>
        </tr>

        {% for medicine in medicines %}

        <tr>
            <td>{{ medicine[0] }}</td>
            <td>{{ medicine[1] }}</td>
            <td>{{ medicine[2] }}</td>
            <td>{{ medicine[3] }}</td>
            <td>{{ medicine[4] }}</td>
            <td>{{ medicine[5] }}</td>
        </tr>

        {% endfor %}

    </table>

    <br>

    <a href="/medicines" class="dashboard-link">
        Back to Dashboard
    </a>

</div>

</body>
</html>
