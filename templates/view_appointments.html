<!DOCTYPE html>
<html>
<head>
    <title>View Appointments</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="table-container">

    <h1>📋 All Appointments</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Date</th>
            <th>Time</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        {% for a in appointments %}
        <tr>
            <td>{{ a.appointment_id }}</td>
            <td>{{ a.patient_name }}</td>
            <td>{{ a.doctor_name }}</td>
            <td>{{ a.appointment_date }}</td>
            <td>{{ a.appointment_time }}</td>
            <td>{{ a.reason }}</td>
            <td>{{ a.status }}</td>

            <td>
                <a href="/deleteappointment/{{ a.appointment_id }}">
                    ❌ Delete
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>

    <br>

    <a href="/appointments">
        <button class="secondary-btn">Back</button>
    </a>

</div>

</body>
</html>
