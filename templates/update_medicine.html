<!DOCTYPE html>
<html>
<head>
    <title>Update Medicine</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="form-container">

    <div class="form-card">

        <h1>✏️ Update Medicine</h1>

        <form action="/medicines/update/save" method="POST">

            <label>Medicine ID</label>
            <input type="number"
                   name="medicine_id"
                   required>

            <label>Price</label>
            <input type="number"
                   step="0.01"
                   name="price"
                   required>

            <label>Quantity</label>
            <input type="number"
                   name="quantity"
                   required>

            <button type="submit">
                Update Medicine
            </button>

        </form>

        <br>

        <a href="/medicines">
            <button class="secondary-btn">
                Back
            </button>
        </a>

    </div>

</div>

</body>
</html>
