<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medicine Saved Successfully</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }

        .checkmark {
            font-size: 60px;
            color: #28a745;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            margin: 5px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="checkmark">✔</div>

    <h1>Medicine Saved Successfully!</h1>

    <p>The medicine has been added/updated in the system.</p>

    <a href="/medicines/add" class="btn btn-success">➕ Add Another</a>
    <a href="/medicines/view" class="btn btn-primary">📋 View Medicines</a>

</div>

</body>
</html>
