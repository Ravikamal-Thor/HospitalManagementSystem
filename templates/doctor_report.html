<!DOCTYPE html>
<html>
<head>

<title>Doctor Report</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="table-container">

<h1>👨‍⚕️ Doctor Report</h1>

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Phone</th>
<th>Experience</th>

</tr>

{% for doctor in doctors %}

<tr>

<td>{{ doctor[0] }}</td>
<td>{{ doctor[1] }}</td>
<td>{{ doctor[2] }}</td>
<td>{{ doctor[3] }}</td>
<td>{{ doctor[4] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/reports" class="dashboard-link">
Back To Reports
</a>

</div>

</body>
</html>
