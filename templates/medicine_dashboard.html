<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet"

</head>

<body>

    <div class="dashboard-header">

        <p>Manage Hospital Medicines Professionally</p>

    </div>

    <div class="dashboard-cards">

        <a href="/medicines/add" class="card">
            <h2>➕</h2>
            <h3>Add Medicine</h3>
