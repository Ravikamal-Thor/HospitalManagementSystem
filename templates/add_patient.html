<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="form-container">

    <div class="form-card">

        <h1>➕ Add Patient</h1>
<form action="/savepatient" method="POST">

    <!-- Patient Name -->
    <label>Patient Name</label>
    <input
        type="text"
        name="patient_name"
        pattern="[A-Za-z ]+"
        title="Only letters are allowed"
        onkeypress="return /[a-zA-Z ]/.test(event.key)"
        required>

    <!-- Age -->
    <label>Age</label>
    <input
        type="number"
        name="age"
        min="1"
        max="120"
        oninput="
            if(this.value.length > 3)
            this.value = this.value.slice(0,3)"
        required>

    <!-- Gender -->
    <label>Gender</label>

    <select name="gender" required>

        <option value="">Select Gender</option>

        <option value="Male">Male</option>

        <option value="Female">Female</option>

        <option value="Other">Other</option>

    </select>

    <!-- Phone Number -->
    <label>Phone Number</label>
    <input
        type="text"
        name="phone"
        maxlength="10"
        pattern="[0-9]{10}"
        title="Enter exactly 10 digits"
        onkeypress="return /[0-9]/.test(event.key)"
        required>

    <!-- Disease -->
    <label>Disease</label>
    <input
        type="text"
        name="disease"
        pattern="[A-Za-z ]+"
        title="Only letters are allowed"
        onkeypress="return /[a-zA-Z ]/.test(event.key)"
        required>

    <!-- Doctor Name -->
    <label>Doctor Name</label>
    <input
        type="text"
        name="doctor_name"
        pattern="[A-Za-z ]+"
        title="Only letters are allowed"
        onkeypress="return /[a-zA-Z ]/.test(event.key)"
        required>

    <button type="submit">
        Save Patient
    </button>

</form>

    </div>

</div>

</body>
</html>
